<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Dev Kit · Component Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ["'DM Sans'","sans-serif"], mono: ["'JetBrains Mono'","monospace"] } } }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;font-family:'DM Sans',sans-serif;background:#f6f7f9;color:#111827}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px}
    ::selection{background:#e0e7ff;color:#3730a3}

    /* ── Kit animations ── */
    @keyframes kit-in    {from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
    @keyframes kit-spin  {to{transform:rotate(360deg)}}
    @keyframes kit-pulse {0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes kit-slide-down {from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
    @keyframes kit-scale-in   {from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
    .kit-in         {animation:kit-in        220ms cubic-bezier(.22,.68,0,1.2) both}
    .kit-spin       {animation:kit-spin      800ms linear infinite}
    .kit-pulse      {animation:kit-pulse     1.8s  ease infinite}
    .kit-slide-down {animation:kit-slide-down 180ms ease both}
    .kit-scale-in   {animation:kit-scale-in   200ms cubic-bezier(.22,.68,0,1.2) both}

    /*
    ┌─────────────────────────────────────────────────────────────────┐
    │  INPUT BASELINE  — theme-agnostic foundation                   │
    │                                                                 │
    │  .inp         Pure native element. No visual opinions.         │
    │               Consumers style via .inp-shell or className.     │
    │                                                                 │
    │  .inp-shell   Default themed container. Swap this class        │
    │               entirely to re-skin all inputs at once.          │
    │               Modifiers: .is-err  .is-ok  .is-disabled         │
    └─────────────────────────────────────────────────────────────────┘
    */
    .inp{
      display:block;width:100%;font-family:inherit;font-size:14px;
      line-height:1.5;color:inherit;background:transparent;
      border:none;outline:none;padding:0;-webkit-appearance:none;appearance:none;
    }
    .inp::placeholder{color:#9ca3af}
    .inp:disabled{cursor:not-allowed;opacity:.5}

    .inp-shell{
      display:flex;align-items:center;gap:8px;width:100%;
      background:#fff;border:1.5px solid #d1d5db;border-radius:8px;
      padding:9px 12px;cursor:text;
      transition:border-color 140ms,box-shadow 140ms;
    }
    .inp-shell:focus-within{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
    .inp-shell.is-err     {border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.10)}
    .inp-shell.is-ok      {border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.10)}
    .inp-shell.is-disabled{background:#f9fafb;opacity:.6;cursor:not-allowed;pointer-events:none}
    .inp-shell.is-area    {align-items:flex-start}
    .inp-shell.is-area .inp{resize:vertical}

    /* ── Tooltip ── */
    .kit-tooltip-wrap{position:relative;display:inline-flex}
    .kit-tooltip-wrap:hover .kit-tooltip-bubble,
    .kit-tooltip-wrap:focus-within .kit-tooltip-bubble{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
    .kit-tooltip-bubble{
      position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%) translateY(3px);
      background:#1f2937;color:#fff;font-size:11.5px;font-weight:500;line-height:1.4;
      padding:5px 10px;border-radius:6px;white-space:nowrap;
      opacity:0;pointer-events:none;transition:opacity 140ms,transform 140ms;
      z-index:50;font-family:'DM Sans',sans-serif;
    }
    .kit-tooltip-bubble::after{
      content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
      border:5px solid transparent;border-top-color:#1f2937;
    }
    .kit-tooltip-bubble.is-bottom{bottom:auto;top:calc(100% + 6px);transform:translateX(-50%) translateY(-3px)}
    .kit-tooltip-bubble.is-bottom::after{top:auto;bottom:100%;border-top-color:transparent;border-bottom-color:#1f2937}

    /* ── Popover / Dropdown ── */
    .kit-dropdown{
      position:absolute;z-index:50;min-width:180px;
      background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;
      box-shadow:0 8px 24px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.06);
      overflow:hidden;
    }

    /* util */
    .tabnum{font-variant-numeric:tabular-nums}
    .trunc{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  </style>
</head>

───────────────────────────────────────────────────────────────────────── */

/* ═══════════════════════════════════════════════════════════════════════════

   ─────────────────────────────────────────────────────────────────────────

═══════════════════════════════════════════════════════════════════════════ */

═══════════════════════════════════════════════════════════════════════════ */

function Icon({ name, size=16, color="currentColor", strokeWidth=2, fill="none", className="", style:sx }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24"
      fill={fill} stroke={color} strokeWidth={strokeWidth}

/* ═══════════════════════════════════════════════════════════════════════════
   LAYER 1.5 — PRIMITIVE HOOKS
   ─────────────────────────────────────────────────────────────────────────
   Reusable logic hooks. No UI, no side-effects outside their concern.
═══════════════════════════════════════════════════════════════════════════ */

/* ── useCopy ─────────────────────────────────────────────────────────────── */
/*
  [copied, copy] = useCopy(resetAfter?)
  Each instance owns its own state. Does not share copied status.
*/
function useCopy(resetAfter = 1800) {
  const [copied, setCopied] = useState(false);
  const t = useRef(null);
  const copy = useCallback((text) => {
    navigator.clipboard.writeText(text).catch(() => {});
    setCopied(true);
    clearTimeout(t.current);
    t.current = setTimeout(() => setCopied(false), resetAfter);
  }, [resetAfter]);
  useEffect(() => () => clearTimeout(t.current), []);
  return [copied, copy];
}

/* ── useDisclosure ───────────────────────────────────────────────────────── */
/*
  [open, handlers] = useDisclosure(initialState?)
  handlers: { open, close, toggle }
  Used for modals, dropdowns, accordions, etc.
*/
function useDisclosure(initial = false) {
  const [open, setOpen] = useState(initial);
  const handlers = {
    open:   useCallback(() => setOpen(true),  []),
    close:  useCallback(() => setOpen(false), []),
    toggle: useCallback(() => setOpen(p => !p), []),
  };
  return [open, handlers];
}

/* ── useClickOutside ─────────────────────────────────────────────────────── */
/*
  Calls handler when a click occurs outside the ref element.
  Used by Dropdown, Modal, etc.
*/
function useClickOutside(ref, handler) {
  useEffect(() => {
    const listener = (e) => {
      if (!ref.current || ref.current.contains(e.target)) return;
      handler(e);
    };
    document.addEventListener("mousedown", listener);
    document.addEventListener("touchstart", listener);
    return () => {
      document.removeEventListener("mousedown", listener);
      document.removeEventListener("touchstart", listener);
    };
  }, [ref, handler]);
}

/* ── cx — className joiner ─────────────────────────────────────────────── */
const cx = (...args) => args.filter(Boolean).join(" ");

/* ═══════════════════════════════════════════════════════════════════════════
   LAYER 2 — KIT INFRASTRUCTURE
   ─────────────────────────────────────────────────────────────────────────
   Dev Kit shell components. Catalog UI only — not product components.
═══════════════════════════════════════════════════════════════════════════ */

/* ── CopyJSXButton ──────────────────────────────────────────────────────── */
/*
  Copies a JSX string to clipboard.
  Used in ComponentFrame headers.
  Self-contained: owns its copied state via useCopy.
*/
function CopyJSXButton({ code, label="JSX" }) {
  const [copied, copy] = useCopy();
  return (
    <button
      onClick={e => { e.stopPropagation(); copy(code); }}
      className={cx(
        "inline-flex items-center gap-1 pl-2 pr-2.5 py-[3px] rounded-full",
        "text-[10.5px] font-semibold tracking-wide border cursor-pointer",
        "transition-all duration-150 select-none focus:outline-none",
        copied
          ? "bg-emerald-50 border-emerald-200 text-emerald-700"
          : "bg-white border-neutral-200 text-neutral-400 hover:border-indigo-300 hover:text-indigo-600"
      )}
    >
      <Icon name={copied ? "check" : "copy"} size={10} strokeWidth={2.5} />
      {copied ? "copiado!" : label}
    </button>
  );
}

/* ── ComponentFrame ──────────────────────────────────────────────────────── */
/*
  Wraps each component preview with a label + CopyJSXButton header.
  `code` is the exact JSX string for that variation.
*/
function ComponentFrame({ title, code, children, noPad=false, className="" }) {
  return (
    <div className={cx(
      "rounded-xl border border-neutral-200 bg-white overflow-hidden",
      "shadow-[0_1px_2px_rgba(0,0,0,.04)]",
      className
    )}>
      <div className="flex items-center justify-between px-3 py-2 border-b border-neutral-100 bg-neutral-50/80">
        <span className="text-[10px] font-bold text-neutral-400 tracking-[.12em] uppercase trunc mr-2">
          {title}
        </span>
        {code && <CopyJSXButton code={code} />}
      </div>
      <div className={noPad ? "" : "p-4"}>{children}</div>
    </div>
  );
}

/* ── CodeBlock ───────────────────────────────────────────────────────────── */
function CodeBlock({ code, lang="jsx" }) {
  const [copied, copy] = useCopy();
  return (
    <div className="rounded-xl overflow-hidden border border-neutral-800">
      <div className="flex items-center justify-between px-4 py-2 bg-neutral-800 border-b border-neutral-700">
        <span className="text-[10px] font-semibold text-neutral-500 tracking-widest uppercase"
              style={{ fontFamily: T.font.mono }}>{lang}</span>
        <button
          onClick={() => copy(code)}
          className={cx(
            "inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-[10.5px] font-semibold border transition-all duration-150",
            copied
              ? "bg-emerald-900/40 border-emerald-700/40 text-emerald-400"
              : "bg-white/5 border-white/10 text-neutral-400 hover:text-white"
          )}
        >
          <Icon name={copied ? "check" : "copy"} size={10} />
          {copied ? "copiado" : "copiar"}
        </button>
      </div>
      <pre className="bg-neutral-900 text-neutral-300 px-5 py-4 text-[12px] leading-[1.9] overflow-x-auto"
           style={{ fontFamily: T.font.mono }}>
        {code}
      </pre>
    </div>
  );
}

/* ── SectionHeading ──────────────────────────────────────────────────────── */
const SectionHeading = ({ index, title, description }) => (
  <div className="mb-8">
    <div className="flex items-baseline gap-3 mb-1">
      <span className="text-[10px] font-bold tracking-[.22em] text-indigo-400 tabnum">
        {String(index).padStart(2,"0")}
      </span>
      <h2 className="text-[20px] font-bold text-neutral-900 tracking-tight leading-none">{title}</h2>
    </div>
    {description && <p className="text-[13px] text-neutral-500 mt-1.5 ml-[34px]">{description}</p>}
    <div className="mt-4 h-px bg-neutral-200/70" />
  </div>
);

/* ── GroupLabel ──────────────────────────────────────────────────────────── */
const GroupLabel = ({ children, className="" }) => (
  <div className={cx("text-[9.5px] font-extrabold text-neutral-400 tracking-[.18em] uppercase mb-3", className)}>
    {children}
  </div>
);

/* ── PreviewRow ──────────────────────────────────────────────────────────── */
const PreviewRow = ({ label, children, className="" }) => (
  <div className={cx("mb-8", className)}>
    {label && <GroupLabel>{label}</GroupLabel>}
    <div className="flex flex-wrap items-start gap-3">{children}</div>
  </div>
);

/* ── PreviewGrid ─────────────────────────────────────────────────────────── */
const PreviewGrid = ({ min=280, gap=12, children, className="" }) => (
  <div className={className}
    style={{ display:"grid", gridTemplateColumns:`repeat(auto-fill,minmax(${min}px,1fr))`, gap }}>
    {children}
  </div>
);

/* ── Divider ─────────────────────────────────────────────────────────────── */
const Divider = ({ className="" }) => (
  <div className={cx("h-px bg-neutral-200/60 my-7", className)} />
);

/* ═══════════════════════════════════════════════════════════════════════════
   LAYER 3 — PRODUCT COMPONENTS
   ─────────────────────────────────────────────────────────────────────────
   Each component is:
     ✦ Fully self-contained (no hidden deps on other Layer 3 items)
     ✦ Extensible via variant/size maps as the primary extension point
     ✦ Overridable via className prop (wins over defaults)
     ✦ Controlled (value + onChange) — no hidden internal state except UI
     ✦ Accessible (role, aria, keyboard)
     ✦ JSX-documented via *_JSX constant maps
═══════════════════════════════════════════════════════════════════════════ */

/* ┌──────────────────────────────────────────────────────────────────────────
   │  BUTTON
   │
   │  Props:
   │    variant   — "primary"|"secondary"|"outline"|"ghost"|"destructive"|
   │                "success"|"warning"|"link"
   │    size      — "xs"|"sm"|"md"|"lg"|"xl"
   │    pill      — boolean (rounded-full)
   │    icon      — boolean (square icon-only button)
   │    loading   — boolean (spinner, disables click)
   │    disabled  — boolean
   │    fullWidth — boolean
   │    leftSlot  — ReactNode (rendered left of children)
   │    rightSlot — ReactNode (rendered right of children)
   │    className — string (appended, wins over defaults)
   │
   │  Extension: add entries to BTN_VARIANT_MAP / BTN_SIZE_MAP
   └────────────────────────────────────────────────────────────────────── */
const BTN_VARIANT_MAP = {
  primary:     "bg-indigo-600 text-white border-transparent hover:bg-indigo-700 active:bg-indigo-800 shadow-sm",
  secondary:   "bg-indigo-50  text-indigo-700 border-indigo-100 hover:bg-indigo-100 active:bg-indigo-200",
  outline:     "bg-transparent text-indigo-600 border-indigo-400 hover:bg-indigo-50 active:bg-indigo-100",
  ghost:       "bg-transparent text-neutral-700 border-transparent hover:bg-neutral-100 active:bg-neutral-200",
  destructive: "bg-red-600 text-white border-transparent hover:bg-red-700 active:bg-red-800 shadow-sm",
  success:     "bg-emerald-600 text-white border-transparent hover:bg-emerald-700 active:bg-emerald-800",
  warning:     "bg-amber-500 text-white border-transparent hover:bg-amber-600 active:bg-amber-700",
  link:        "bg-transparent text-indigo-600 border-transparent underline underline-offset-4 hover:text-indigo-800 px-0 py-0",
};

const BTN_SIZE_MAP = {
  xs: { cls:"text-[11px] px-2.5 py-1 gap-1",    iconSz:26 },
  sm: { cls:"text-[12px] px-3   py-1.5 gap-1.5", iconSz:30 },
  md: { cls:"text-[13px] px-4   py-2 gap-2",     iconSz:36 },
  lg: { cls:"text-[14px] px-5   py-2.5 gap-2.5", iconSz:42 },
  xl: { cls:"text-[15px] px-7   py-3 gap-3",     iconSz:50 },
};

function Button({
  variant="primary", size="md",
  pill=false, icon=false, loading=false,
  disabled=false, fullWidth=false,
  leftSlot=null, rightSlot=null,
  className="", style:sx, onClick,
  type="button", children, "aria-label":ariaLabel, ...rest
}) {
  const v = BTN_VARIANT_MAP[variant] ?? BTN_VARIANT_MAP.primary;
  const s = BTN_SIZE_MAP[size]       ?? BTN_SIZE_MAP.md;
  return (
    <button
      type={type} disabled={disabled||loading} onClick={onClick}
      aria-label={ariaLabel} aria-disabled={disabled||loading}
      style={icon ? { width:s.iconSz, height:s.iconSz, ...sx } : sx}
      className={cx(
        "inline-flex items-center border font-semibold leading-none",
        "transition-all duration-150 focus:outline-none",
        "focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2",
        "disabled:opacity-40 disabled:cursor-not-allowed disabled:pointer-events-none",
        pill ? "rounded-full" : "rounded-lg",
        v,
        icon ? "flex items-center justify-center p-0" : s.cls,
        fullWidth && "w-full justify-center",
        className
      )}
      {...rest}
    >
      {loading
        ? <Icon name="loader" size={14} className="kit-spin" />
        : <>
            {leftSlot  && <span className="shrink-0 flex items-center">{leftSlot}</span>}
            {children}
            {rightSlot && <span className="shrink-0 flex items-center">{rightSlot}</span>}
          </>
      }
    </button>
  );
}

/* ┌──────────────────────────────────────────────────────────────────────────
   │  INPUT FAMILY
   │
   │  Architecture:
   │    InputShell  — styled container (.inp-shell). Swap class to re-skin.
   │    Field       — composition wrapper: label + input + hint/error/success
   │    FieldLabel  — label with optional required marker
   │    FieldHint   — helper text below field
   │    FieldError  — error message (with icon)
   │    FieldOk     — success message (with icon)
   │
   │  Input atoms:
   │    TextInput      — type text|email|number|search|url|tel
   │    PasswordInput  — TextInput + show/hide toggle
   │    Textarea       — multiline + optional char counter
   │    SelectInput    — native select + custom chevron
   │    FileInput      — hidden <input type=file> + Button trigger
   │    RangeInput     — range slider + value display
   │
   │  Selection controls:
   │    Checkbox       — single checkbox (with indeterminate)
   │    RadioGroup     — group from options array
   │    Switch         — toggle switch (sm|md|lg sizes)
   │    StarRating     — 1–N star selector
   │    CheckboxCard   — card-style checkbox
   │
   │  All inputs are:
   │    ✦ Theme-agnostic (.inp / .inp-shell CSS, no Tailwind hardcoded colors)
   │    ✦ Controlled (value + onChange)
   │    ✦ Extensible via className
   └────────────────────────────────────────────────────────────────────── */

/* ── InputShell ──────────────────────────────────────────────────────────── */
/* state: "default"|"error"|"success" */
function InputShell({ state, disabled, textarea, className="", children, onClick }) {
  return (
    <div onClick={onClick} className={cx(
      "inp-shell",
      state==="error"   && "is-err",
      state==="success" && "is-ok",
      disabled          && "is-disabled",
      textarea          && "is-area",
      className
    )}>
      {children}
    </div>
  );
}

/* ── FieldLabel ──────────────────────────────────────────────────────────── */
function FieldLabel({ htmlFor, required, children, className="" }) {
  return (
    <label htmlFor={htmlFor} className={cx("block text-[13px] font-medium text-neutral-700", className)}>
      {children}
      {required && <span className="text-red-500 ml-0.5" aria-hidden="true">*</span>}
    </label>
  );
}

/* ── FieldHint ───────────────────────────────────────────────────────────── */
const FieldHint = ({ children, className="" }) => (
  <p className={cx("text-[11.5px] text-neutral-400 leading-relaxed", className)}>{children}</p>
);

/* ── FieldError ──────────────────────────────────────────────────────────── */
const FieldError = ({ children, className="" }) => (
  <p role="alert" className={cx("text-[11.5px] text-red-500 flex items-center gap-1", className)}>
    <Icon name="alertCircle" size={12} color="#ef4444" />{children}
  </p>
);

/* ── FieldOk ─────────────────────────────────────────────────────────────── */
const FieldOk = ({ children, className="" }) => (
  <p className={cx("text-[11.5px] text-emerald-600 flex items-center gap-1", className)}>
    <Icon name="checkCircle" size={12} color="#16a34a" />{children}
  </p>
);

/* ── Field ───────────────────────────────────────────────────────────────── */
/*
  Composition wrapper. Renders: label → children → hint/error/success.
  All slots are optional — use only what you need.
*/
function Field({ id, label, required, hint, error, success, children, className="" }) {
  return (
    <div className={cx("flex flex-col gap-1.5", className)}>
      {label && <FieldLabel htmlFor={id} required={required}>{label}</FieldLabel>}
      {children}
      {error   ? <FieldError>{error}</FieldError>
      : success ? <FieldOk>{success}</FieldOk>
      : hint    ? <FieldHint>{hint}</FieldHint>
      : null}
    </div>
  );
}

/* ── TextInput ───────────────────────────────────────────────────────────── */
/* prefix/suffix: ReactNode slots (icons, buttons, etc.) */
function TextInput({ id, type="text", placeholder, value, onChange,
  disabled, state, prefix, suffix, className="", inputClassName="", ...rest }) {
  return (
    <InputShell state={state} disabled={disabled} className={className}>
      {prefix && <span className="shrink-0 text-neutral-400 flex items-center">{prefix}</span>}
      <input id={id} type={type} placeholder={placeholder}
        value={value} onChange={onChange} disabled={disabled}
        className={cx("inp flex-1", inputClassName)} {...rest} />
      {suffix && <span className="shrink-0 text-neutral-400 flex items-center">{suffix}</span>}
    </InputShell>
  );
}

/* ── PasswordInput ───────────────────────────────────────────────────────── */
function PasswordInput({ id, placeholder="••••••••", value, onChange,
  disabled, state, className="", ...rest }) {
  const [visible, setVisible] = useState(false);
  return (
    <InputShell state={state} disabled={disabled} className={className}>
      <input id={id} type={visible?"text":"password"}
        placeholder={placeholder} value={value}
        onChange={onChange} disabled={disabled}
        className="inp flex-1" {...rest} />
      <button type="button" tabIndex={-1}
        onClick={() => setVisible(p => !p)}
        className="shrink-0 text-neutral-400 hover:text-neutral-600 flex items-center transition-colors duration-100"
        aria-label={visible ? "Ocultar senha" : "Mostrar senha"}>
        <Icon name={visible?"eyeOff":"eye"} size={16} />
      </button>
    </InputShell>
  );
}

/* ── Textarea ────────────────────────────────────────────────────────────── */
function Textarea({ id, placeholder, value, onChange, disabled, state,
  rows=4, maxLength, showCount=false, className="", ...rest }) {
  const len  = (value||"").length;
  const near = maxLength && len > maxLength * .85;
  return (
    <div className="relative">
      <InputShell state={state} disabled={disabled} textarea className={className}>
        <textarea id={id} placeholder={placeholder}
          value={value} onChange={onChange}
          disabled={disabled} rows={rows} maxLength={maxLength}
          className="inp w-full leading-relaxed resize-y" {...rest} />
      </InputShell>
      {showCount && maxLength && (
        <span className={cx("absolute bottom-2.5 right-3 text-[10.5px] tabnum pointer-events-none",
          near?"text-red-400":"text-neutral-300")}>
          {len}/{maxLength}
        </span>
      )}
    </div>
  );
}

/* ── SelectInput ─────────────────────────────────────────────────────────── */
/* options: [{ value, label }] or plain strings */
function SelectInput({ id, options=[], value, onChange, disabled, state,
  placeholder="Selecione…", className="", ...rest }) {
  return (
    <InputShell state={state} disabled={disabled} className={className}>
      <select id={id} value={value} onChange={onChange}
        disabled={disabled} className="inp flex-1 pr-6 cursor-pointer" {...rest}>
        {placeholder && <option value="" disabled>{placeholder}</option>}
        {options.map(o => {
          const v = typeof o==="object"?o.value:o;
          const l = typeof o==="object"?o.label:o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
      <span className="pointer-events-none shrink-0 text-neutral-400">
        <Icon name="chevDown" size={15} />
      </span>
    </InputShell>
  );
}

/* ── FileInput ───────────────────────────────────────────────────────────── */
function FileInput({ id, accept, multiple=false, onChange, disabled,
  triggerLabel="Escolher arquivo", triggerVariant="outline", triggerSize="sm",
  className="", ...rest }) {
  const [fileLabel, setFileLabel] = useState(null);
  const ref = useRef(null);
  const handle = (e) => {
    const files = e.target.files;
    if (files?.length) setFileLabel(multiple?`${files.length} arquivo(s)`:files[0].name);
    onChange?.(e);
  };
  return (
    <div className={cx("flex items-center gap-2.5", className)}>
      <input ref={ref} id={id} type="file" accept={accept}
        multiple={multiple} onChange={handle}
        disabled={disabled} className="sr-only" {...rest} />
      <Button size={triggerSize} variant={triggerVariant}
        disabled={disabled}
        leftSlot={<Icon name="paperclip" size={14} />}
        onClick={() => ref.current?.click()}>
        {triggerLabel}
      </Button>
      <span className="text-[12px] text-neutral-400 trunc max-w-[190px]">
        {fileLabel ?? "Nenhum arquivo selecionado"}
      </span>
    </div>
  );
}

/* ── RangeInput ──────────────────────────────────────────────────────────── */
function RangeInput({ id, min=0, max=100, step=1, value, onChange,
  disabled, showValue=true, showLabels=true, unit="%", label,
  className="", ...rest }) {
  return (
    <div className={cx("flex flex-col gap-2", className)}>
      {(label||showValue) && (
        <div className="flex justify-between items-center">
          {label && <span className="text-[12px] text-neutral-600">{label}</span>}
          {showValue && <span className="text-[13px] font-semibold text-indigo-600 tabnum ml-auto">{value}{unit}</span>}
        </div>
      )}
      <input id={id} type="range" min={min} max={max} step={step}
        value={value} onChange={onChange} disabled={disabled}
        className="w-full h-1.5 rounded-full cursor-pointer"
        style={{ accentColor: T.color.primary[600] }} {...rest} />
      {showLabels && (
        <div className="flex justify-between">
          <span className="text-[11px] text-neutral-400">{min}{unit}</span>
          <span className="text-[11px] text-neutral-400">{max}{unit}</span>
        </div>
      )}
    </div>
  );
}

/* ── Checkbox ────────────────────────────────────────────────────────────── */
/* indeterminate: renders dash instead of check. size: "sm"|"md"|"lg" */
function Checkbox({ id, label, description, checked=false, onChange,
  disabled=false, indeterminate=false, size="md", className="" }) {
  const sz = { sm:"w-3.5 h-3.5 rounded", md:"w-4 h-4 rounded", lg:"w-5 h-5 rounded-md" }[size] ?? "w-4 h-4 rounded";
  const checkId = id ?? useRef(`chk-${Math.random().toString(36).slice(2)}`).current;
  return (
    <label htmlFor={checkId} className={cx("inline-flex items-start gap-2.5 cursor-pointer select-none",
      disabled&&"opacity-50 cursor-not-allowed", className)}>
      <div id={checkId} role="checkbox" aria-checked={indeterminate?"mixed":checked}
        tabIndex={0}
        onClick={() => !disabled&&onChange?.(!checked)}
        onKeyDown={e => (e.key===" "||e.key==="Enter")&&!disabled&&onChange?.(!checked)}
        className={cx("mt-[1px] shrink-0 border-2 flex items-center justify-center",
          "transition-all duration-150 focus:outline-none",
          "focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-1",
          sz,
          (checked||indeterminate)?"bg-indigo-600 border-indigo-600":"bg-white border-neutral-300"
        )}>
        {indeterminate
          ? <span className="block bg-white rounded-sm" style={{width:"8px",height:"2px"}} />
          : checked
            ? <Icon name="check" size={size==="lg"?12:10} color="#fff" strokeWidth={3} />
            : null
        }
      </div>
      {(label||description) && (
        <div className="leading-tight">
          {label && <span className="text-[13px] text-neutral-800 leading-snug">{label}</span>}
          {description && <p className="text-[11.5px] text-neutral-400 mt-0.5 leading-relaxed">{description}</p>}
        </div>
      )}
    </label>
  );
}

/* ── RadioGroup ──────────────────────────────────────────────────────────── */
/* options: [{ value, label, description?, disabled? }] */
function RadioGroup({ name, options=[], value, onChange, disabled=false, className="" }) {
  return (
    <div role="radiogroup" aria-label={name} className={cx("flex flex-col gap-2.5", className)}>
      {options.map(opt => {
        const active = value===opt.value;
        const dis    = disabled||opt.disabled;
        return (
          <label key={opt.value} className={cx("inline-flex items-start gap-2.5 cursor-pointer select-none",
            dis&&"opacity-50 cursor-not-allowed")}>
            <div role="radio" aria-checked={active} tabIndex={0}
              onClick={() => !dis&&onChange?.(opt.value)}
              onKeyDown={e => (e.key===" "||e.key==="Enter")&&!dis&&onChange?.(opt.value)}
              className={cx("mt-[1px] shrink-0 w-4 h-4 rounded-full border-2 flex items-center justify-center bg-white",
                "transition-all duration-150 focus:outline-none",
                "focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-1",
                active?"border-indigo-600":"border-neutral-300")}>
              {active && <span className="w-2 h-2 rounded-full bg-indigo-600" />}
            </div>
            <div>
              <span className="text-[13px] text-neutral-800">{opt.label}</span>
              {opt.description && <p className="text-[11.5px] text-neutral-400 mt-0.5">{opt.description}</p>}
            </div>
          </label>
        );
      })}
    </div>
  );
}

/* ── Switch ──────────────────────────────────────────────────────────────── */
const SWITCH_SIZES = {
  sm:{ track:"w-8 h-[18px]",      thumb:"w-3 h-3",   on:18, off:2 },
  md:{ track:"w-[42px] h-6",      thumb:"w-4 h-4",   on:22, off:2 },
  lg:{ track:"w-[52px] h-[28px]", thumb:"w-5 h-5",   on:28, off:3 },
};

function Switch({ id, checked=false, onChange, disabled=false,
  size="md", label, description, className="" }) {
  const s = SWITCH_SIZES[size] ?? SWITCH_SIZES.md;
  return (
    <label className={cx("inline-flex items-center gap-2.5 cursor-pointer select-none",
      disabled&&"opacity-50 cursor-not-allowed", className)}>
      <button id={id} type="button" role="switch" aria-checked={checked}
        disabled={disabled} onClick={() => !disabled&&onChange?.(!checked)}
        className={cx("relative rounded-full shrink-0 border-2 transition-colors duration-200",
          "focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2",
          s.track, checked?"bg-indigo-600 border-indigo-600":"bg-neutral-200 border-neutral-200")}>
        <span aria-hidden="true"
          className={cx(s.thumb, "absolute top-1/2 -translate-y-1/2 rounded-full bg-white shadow-sm transition-all duration-200")}
          style={{ left: checked?s.on:s.off }} />
      </button>
      {(label||description) && (
        <div>
          {label && <span className="text-[13px] text-neutral-800 leading-tight">{label}</span>}
          {description && <p className="text-[11.5px] text-neutral-400 mt-0.5">{description}</p>}
        </div>
      )}
    </label>
  );
}

/* ── StarRating ──────────────────────────────────────────────────────────── */
function StarRating({ value=0, onChange, max=5, disabled=false,
  labels=["","Péssimo","Ruim","Regular","Bom","Excelente"],
  size="md", className="" }) {
  const [hovered, setHovered] = useState(0);
  const active = hovered||value;
  const sz = {sm:20,md:26,lg:34}[size]??26;
  return (
    <div className={cx("flex flex-col gap-1.5", className)}>
      <div className="flex gap-0.5" role="group" aria-label="Avaliação">
        {Array.from({length:max},(_,i)=>i+1).map(i => (
          <button key={i} type="button" disabled={disabled}
            aria-label={`${i} estrela${i>1?"s":""}`} aria-pressed={value>=i}
            onMouseEnter={() => !disabled&&setHovered(i)}
            onMouseLeave={() => !disabled&&setHovered(0)}
            onClick={() => !disabled&&onChange?.(value===i?0:i)}
            className="transition-transform duration-100 hover:scale-110 focus:outline-none focus-visible:scale-110 disabled:cursor-not-allowed">
            <Icon name="star" size={sz}
              fill={active>=i?"#818cf8":"none"}
              color={active>=i?"#6366f1":"#d1d5db"}
              strokeWidth={1.5} />
          </button>
        ))}
      </div>
      {labels[value] && <span className="text-[12px] text-neutral-500">{labels[value]}</span>}
    </div>
  );
}

/* ── CheckboxCard ────────────────────────────────────────────────────────── */
function CheckboxCard({ checked=false, onChange, title, description,
  icon, disabled=false, className="" }) {
  return (
    <div role="checkbox" aria-checked={checked} tabIndex={0}
      onClick={() => !disabled&&onChange?.(!checked)}
      onKeyDown={e => (e.key===" "||e.key==="Enter")&&!disabled&&onChange?.(!checked)}
      className={cx("flex gap-3 p-4 rounded-xl border-[1.5px] cursor-pointer",
        "transition-all duration-150 select-none focus:outline-none",
        "focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2",
        checked
          ?"border-indigo-500 bg-indigo-50/70 shadow-[0_0_0_1px_rgba(99,102,241,.15)]"
          :"border-neutral-200 bg-white hover:border-neutral-300 hover:bg-neutral-50",
        disabled&&"opacity-50 cursor-not-allowed",
        className
      )}>
      {icon && <span className="shrink-0 text-neutral-400 mt-0.5 flex items-center">{icon}</span>}
      <div className="flex-1 min-w-0">
        <div className="text-[13px] font-semibold text-neutral-800 leading-snug">{title}</div>
        {description && <p className="text-[12px] text-neutral-400 mt-1 leading-relaxed">{description}</p>}
      </div>
      <Checkbox checked={checked} onChange={() => {}} aria-hidden="true" />
    </div>
  );
}

/* ── ProgressBar ── */
const PROGRESS_TRACK_MAP = {
  default:"bg-indigo-600",
  success:"bg-emerald-500",
  warning:"bg-amber-500",
  danger: "bg-red-500",
};

function ProgressBar({ value=0, max=100, label, showValue=true, variant="default", size="md", className="" }) {
  const pct   = Math.min(100, Math.max(0, (value/max)*100));
  const track = PROGRESS_TRACK_MAP[variant]??PROGRESS_TRACK_MAP.default;
  const h     = {sm:"h-1",md:"h-2",lg:"h-3"}[size]??"h-2";
  return (
    <div className={cx("flex flex-col gap-1.5", className)}
      role="progressbar" aria-valuenow={pct} aria-valuemin={0} aria-valuemax={100}>
      {(label||showValue) && (
        <div className="flex justify-between items-center text-[12px]">
          {label && <span className="text-neutral-600">{label}</span>}

}

/* ── Tabs ── */
/*
  variant: "underline"|"pill"|"boxed"
  tabs: [{ value, label, count? }]
*/
const TABS_STYLE_FNS = {
  underline: active => cx(
    "cursor-pointer text-[13px] font-medium px-4 py-2.5 border-b-2 -mb-px whitespace-nowrap select-none",
    "transition-all duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-indigo-500",
    active
      ? "border-indigo-500 text-indigo-600"
      : "border-transparent text-neutral-500 hover:text-neutral-700 hover:border-neutral-200"
  ),
  pill: active => cx(
    "cursor-pointer text-[13px] font-medium px-3.5 py-1.5 rounded-full whitespace-nowrap select-none",
    "transition-all duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500",
    active ? "bg-indigo-600 text-white shadow-sm" : "text-neutral-500 hover:bg-neutral-100 hover:text-neutral-700"
  ),
  boxed: active => cx(
    "cursor-pointer text-[13px] font-medium px-4 py-2 border border-b-0 rounded-t-lg whitespace-nowrap select-none",
    "transition-all duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-indigo-500",
    active
      ? "bg-white border-neutral-200 text-neutral-800 shadow-[0_1px_0_white]"
      : "bg-neutral-50 border-transparent text-neutral-400 hover:text-neutral-600"
  ),
};

function Tabs({ tabs, value, onChange, variant="underline", className="" }) {
  const fn = TABS_STYLE_FNS[variant]??TABS_STYLE_FNS.underline;
  return (
    <div role="tablist"
      className={cx(variant==="pill" ? "flex gap-1" : "flex border-b border-neutral-200", className)}>
      {tabs.map(tab => (
        <button key={tab.value} role="tab" aria-selected={value===tab.value}
          onClick={() => onChange(tab.value)} className={fn(value===tab.value)}>
          <span className="flex items-center gap-1.5">
            {tab.label}
            {tab.count !== undefined && (
              <Badge variant={value===tab.value?"default":"neutral"} size="sm">{tab.count}</Badge>
            )}
          </span>
        </button>
      ))}
    </div>
  );
}

/* ── Breadcrumb ── */
function Breadcrumb({ items, className="" }) {

    <nav aria-label="Breadcrumb" className={cx("flex items-center gap-1.5 flex-wrap", className)}>
      {items.map((item,i) => (
        <span key={i} className="flex items-center gap-1.5 text-[13px]">
          {i===0 && <Icon name="home" size={13} color="#6366f1" />}
          <span className={cx(i===items.length-1
            ? "text-neutral-500 font-medium"
            : "text-indigo-600 cursor-pointer hover:underline")}>
            {item}
          </span>
          {i<items.length-1 && <Icon name="chevRight" size={13} color="#d1d5db" />}
        </span>
      ))}

/* ── Pagination ── */
function Pagination({ page, total, onChange, className="" }) {
  const btnCls = (active, dis) => cx(
    "w-8 h-8 flex items-center justify-center rounded-lg text-[13px] font-medium border",
    "transition-all duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500",
    active ? "bg-indigo-600 text-white border-indigo-600 shadow-sm"
    : dis   ? "bg-white border-neutral-100 text-neutral-300 cursor-not-allowed"
    : "bg-white border-neutral-200 text-neutral-600 cursor-pointer hover:border-indigo-300 hover:text-indigo-600"
  );
  return (
    <nav aria-label="Paginação" className={cx("flex items-center gap-1", className)}>
      <button className={btnCls(false,page===1)} disabled={page===1}
        onClick={() => onChange(page-1)} aria-label="Anterior">
        <Icon name="chevLeft" size={14} />
      </button>
      {Array.from({length:total},(_,i)=>i+1).map(p => (
        <button key={p} aria-current={p===page?"page":undefined}
          onClick={() => onChange(p)} className={btnCls(p===page,false)}>{p}</button>
      ))}
      <button className={btnCls(false,page===total)} disabled={page===total}
        onClick={() => onChange(page+1)} aria-label="Próxima">
        <Icon name="chevRight" size={14} />
      </button>
    </nav>
  );
}

/* ── Stepper ── */
function Stepper({ steps, current, onChange, className="" }) {
  return (
    <div className={cx("flex items-start", className)} role="list" aria-label="Etapas">
      {steps.map((label,i) => {
        const done   = i<current;
        const active = i===current;
        const last   = i===steps.length-1;
        return (
          <div key={label} className="flex items-start" style={{flex:last?"none":1}} role="listitem">
            <div className="flex flex-col items-center gap-1.5">
              <div onClick={() => onChange?.(i)} tabIndex={0}
                aria-label={`Etapa ${i+1}: ${label}${done?" (concluída)":active?" (atual)":""}`}
                onKeyDown={e => (e.key==="Enter"||e.key===" ")&&onChange?.(i)}
                className={cx("w-8 h-8 rounded-full flex items-center justify-center text-[12px] font-bold cursor-pointer",
                  "transition-all duration-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2",
                  done?"bg-emerald-500 text-white"
                  :active?"bg-indigo-600 text-white ring-4 ring-indigo-100"
                  :"bg-neutral-100 text-neutral-400")}>
                {done ? <Icon name="check" size={13} strokeWidth={3} /> : i+1}
              </div>
              <span className={cx("text-[10.5px] font-medium whitespace-nowrap",
                active?"text-indigo-600":done?"text-emerald-600":"text-neutral-400")}>
                {label}
              </span>
            </div>
            {!last && (
              <div className="flex-1 h-[2px] mt-4 mx-2 mb-6 rounded-full transition-colors duration-300"
                   style={{background:done?"#22c55e":"#e5e7eb"}} />
            )}
          </div>
        );

    </div>
  );
}

/* ┌──────────────────────────────────────────────────────────────────────────
   │  OVERLAY FAMILY — Tooltip · Dropdown · Modal · Drawer
   │
   │  Architecture:
   │    Tooltip    — CSS-driven hover/focus tooltip. Zero JS state.
   │    Dropdown   — Absolute-positioned menu with useClickOutside.
   │    Modal      — Centered overlay dialog. Focus-trapped.
   │    Drawer     — Side panel overlay (left|right|bottom).
   │
   │  All overlays:
   │    ✦ Managed via useDisclosure hook
   │    ✦ Keyboard accessible (Escape to close)
   │    ✦ aria-modal / aria-hidden on backdrop
   └────────────────────────────────────────────────────────────────────── */

/* ── Tooltip ─────────────────────────────────────────────────────────────── */
/*
  CSS-only visibility (no React state). Always in DOM.
  placement: "top" (default) | "bottom"
*/
function Tooltip({ content, placement="top", children }) {
  return (
    <span className="kit-tooltip-wrap">
      {children}
      <span className={cx("kit-tooltip-bubble", placement==="bottom"&&"is-bottom")}>
        {content}
      </span>
    </span>
  );
}

/* ── Dropdown ────────────────────────────────────────────────────────────── */
/*
  items: [{ label, icon?, onClick?, divider? }]
  trigger: ReactNode that opens the dropdown
  placement: "bottom-left" (default) | "bottom-right"
*/
function Dropdown({ trigger, items=[], placement="bottom-left", className="" }) {
  const [open, { close, toggle }] = useDisclosure(false);
  const ref = useRef(null);
  useClickOutside(ref, close);

  useEffect(() => {
    if (!open) return;
    const handler = e => e.key==="Escape" && close();
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [open, close]);

  const pos = {
    "bottom-left":  { top:"calc(100% + 6px)", left:0 },
    "bottom-right": { top:"calc(100% + 6px)", right:0 },
  }[placement] ?? { top:"calc(100% + 6px)", left:0 };

  return (
    <div ref={ref} className={cx("relative inline-flex", className)}>
      <div onClick={toggle} className="cursor-pointer">{trigger}</div>
      {open && (
        <div className="kit-dropdown kit-scale-in" style={pos} role="menu" aria-orientation="vertical">
          <div className="py-1">
            {items.map((item, i) => {
              if (item.divider) return <div key={i} className="h-px bg-neutral-100 my-1 mx-2" />;
              return (
                <button key={i} role="menuitem"
                  onClick={() => { item.onClick?.(); close(); }}
                  className={cx(
                    "w-full text-left flex items-center gap-2.5 px-3.5 py-2 text-[13px]",
                    "transition-colors duration-100 focus:outline-none",
                    item.danger
                      ? "text-red-600 hover:bg-red-50"
                      : "text-neutral-700 hover:bg-neutral-50"
                  )}>
                  {item.icon && <Icon name={item.icon} size={14} color={item.danger?"#dc2626":"currentColor"} />}
                  {item.label}
                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Modal ───────────────────────────────────────────────────────────────── */
/*
  open:    boolean (controlled via useDisclosure)
  onClose: () => void
  size:    "sm"|"md"|"lg"|"xl"
  title:   string
  footer:  ReactNode (action buttons)
*/
const MODAL_SIZE_MAP = {
  sm: "max-w-sm",
  md: "max-w-md",
  lg: "max-w-lg",
  xl: "max-w-xl",
};

function Modal({ open, onClose, title, size="md", footer, children }) {
  useEffect(() => {
    if (!open) return;
    const handler = e => e.key==="Escape" && onClose?.();
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [open, onClose]);

  if (!open) return null;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
      role="dialog" aria-modal="true">
      {/* Backdrop */}
      <div className="absolute inset-0 bg-neutral-900/40 backdrop-blur-[2px]"
        aria-hidden="true" onClick={onClose} />
      {/* Panel */}
      <div className={cx(
        "kit-scale-in relative w-full bg-white rounded-2xl shadow-xl overflow-hidden",
        MODAL_SIZE_MAP[size]??MODAL_SIZE_MAP.md
      )}>
        {/* Header */}
        <div className="flex items-center justify-between px-5 py-4 border-b border-neutral-100">
          <h3 className="text-[15px] font-bold text-neutral-900">{title}</h3>
          <button onClick={onClose} aria-label="Fechar modal"
            className="w-7 h-7 flex items-center justify-center rounded-lg text-neutral-400
              hover:bg-neutral-100 hover:text-neutral-700 transition-all duration-150 focus:outline-none
              focus-visible:ring-2 focus-visible:ring-indigo-500">
            <Icon name="x" size={16} />
          </button>
        </div>
        {/* Body */}
        <div className="px-5 py-4 text-[13.5px] text-neutral-600 leading-relaxed">{children}</div>
        {/* Footer */}
        {footer && (
          <div className="flex items-center justify-end gap-2 px-5 py-3.5 border-t border-neutral-100 bg-neutral-50/60">
            {footer}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Drawer ──────────────────────────────────────────────────────────────── */
/*
  side: "right" (default) | "left" | "bottom"
  width/height: custom size string
*/
const DRAWER_SIDE_MAP = {
  right:  { outer:"inset-0",   inner:"ml-auto h-full", animOpen:"translate-x-0",  animClosed:"translate-x-full",  dim:"w-80 max-w-full" },
  left:   { outer:"inset-0",   inner:"mr-auto h-full", animOpen:"translate-x-0",  animClosed:"-translate-x-full", dim:"w-80 max-w-full" },
  bottom: { outer:"inset-0",   inner:"mt-auto w-full", animOpen:"translate-y-0",  animClosed:"translate-y-full",  dim:"max-h-[80vh]" },
};

function Drawer({ open, onClose, title, side="right", children, footer }) {
  const s = DRAWER_SIDE_MAP[side]??DRAWER_SIDE_MAP.right;

  useEffect(() => {
    if (!open) return;
    const handler = e => e.key==="Escape" && onClose?.();
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [open, onClose]);

  if (!open) return null;

  return (
    <div className={cx("fixed z-50 flex", s.outer)} role="dialog" aria-modal="true">
      {/* Backdrop */}
      <div className="absolute inset-0 bg-neutral-900/40 backdrop-blur-[2px]"
        aria-hidden="true" onClick={onClose} />
      {/* Panel */}
      <div className={cx(
        "relative bg-white shadow-2xl flex flex-col overflow-hidden",
        "transition-transform duration-300",
        s.inner, s.dim,
        open ? s.animOpen : s.animClosed
      )}>
        {/* Header */}
        <div className="flex items-center justify-between px-5 py-4 border-b border-neutral-100 shrink-0">
          <h3 className="text-[15px] font-bold text-neutral-900">{title}</h3>
          <button onClick={onClose} aria-label="Fechar painel"
            className="w-7 h-7 flex items-center justify-center rounded-lg text-neutral-400
              hover:bg-neutral-100 hover:text-neutral-700 transition-all duration-150 focus:outline-none
              focus-visible:ring-2 focus-visible:ring-indigo-500">
            <Icon name="x" size={16} />
          </button>
        </div>
        {/* Body */}
        <div className="flex-1 overflow-y-auto px-5 py-4 text-[13.5px] text-neutral-600 leading-relaxed">
          {children}
        </div>
        {/* Footer */}
        {footer && (
          <div className="flex items-center justify-end gap-2 px-5 py-3.5 border-t border-neutral-100 bg-neutral-50/60 shrink-0">
            {footer}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Accordion ───────────────────────────────────────────────────────────── */
/*
  items: [{ id, title, content }]
  single: boolean — collapse others when one opens
*/
function Accordion({ items=[], single=false, className="" }) {
  const [open, setOpen] = useState({});
  const toggle = id => setOpen(prev =>
    single
      ? (prev[id] ? {} : { [id]: true })
      : { ...prev, [id]: !prev[id] }
  );
  return (
    <div className={cx("divide-y divide-neutral-100 border border-neutral-200 rounded-xl overflow-hidden", className)}>
      {items.map(item => (
        <div key={item.id}>
          <button
            onClick={() => toggle(item.id)}
            className={cx(
              "w-full flex items-center justify-between px-4 py-3.5 text-left",
              "text-[13.5px] font-semibold text-neutral-800",
              "hover:bg-neutral-50 transition-colors duration-150 focus:outline-none",
              "focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-indigo-500",
              open[item.id] && "bg-neutral-50"
            )}
            aria-expanded={!!open[item.id]}
          >
            <span>{item.title}</span>
            <Icon name={open[item.id]?"chevUp":"chevDown"} size={16} color="#6b7280"
              className="shrink-0 transition-transform duration-200"
              style={{ transform: open[item.id] ? "rotate(0deg)" : "rotate(0deg)" }} />
          </button>
          {open[item.id] && (
            <div className="kit-slide-down px-4 pb-4 pt-1 text-[13px] text-neutral-500 leading-relaxed bg-white">
              {item.content}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

/* ┌──────────────────────────────────────────────────────────────────────────
   │  AVATAR
   │  src:     image URL (optional — falls back to initials)
   │  name:    used to derive initials when no src
   │  size:    "xs"|"sm"|"md"|"lg"|"xl"
   │  status:  "online"|"offline"|"busy"|"away" (optional indicator dot)
   │  shape:   "circle" (default) | "square"
   └────────────────────────────────────────────────────────────────────── */
const AVATAR_SIZE_MAP = {
  xs: { box:"w-6 h-6",   text:"text-[9px]",  dot:"w-2 h-2 border" },
  sm: { box:"w-8 h-8",   text:"text-[11px]", dot:"w-2.5 h-2.5 border" },
  md: { box:"w-10 h-10", text:"text-[13px]", dot:"w-3 h-3 border-[1.5px]" },
  lg: { box:"w-14 h-14", text:"text-[17px]", dot:"w-3.5 h-3.5 border-2" },
  xl: { box:"w-20 h-20", text:"text-[24px]", dot:"w-4 h-4 border-2" },
};
const AVATAR_STATUS_COLOR = {
  online:"bg-emerald-500", offline:"bg-neutral-400",
  busy:"bg-red-500",       away:"bg-amber-400",
};
/* Derive up to 2 initials from a display name */
function initials(name="") {
  const parts = name.trim().split(/\s+/);
  return parts.length>=2
    ? (parts[0][0]+parts[parts.length-1][0]).toUpperCase()
    : (parts[0]||"?").slice(0,2).toUpperCase();
}
/* A stable pastel bg per name (hash-based) */
function avatarBg(name="") {
  const palette = ["bg-violet-200","bg-sky-200","bg-emerald-200","bg-rose-200","bg-amber-200","bg-teal-200","bg-fuchsia-200"];
  let h = 0;
  for (let i=0; i<name.length; i++) h = ((h<<5)-h)+name.charCodeAt(i);
  return palette[Math.abs(h)%palette.length];
}

function Avatar({ src, name="", size="md", status, shape="circle", className="" }) {
  const [imgErr, setImgErr] = useState(false);
  const s  = AVATAR_SIZE_MAP[size]??AVATAR_SIZE_MAP.md;
  const rnd = shape==="square" ? "rounded-xl" : "rounded-full";
  const sc  = AVATAR_STATUS_COLOR[status];
  return (
    <span className={cx("relative inline-flex shrink-0", s.box, className)}>
      {src && !imgErr
        ? <img src={src} alt={name} onError={()=>setImgErr(true)}
            className={cx("w-full h-full object-cover", rnd)} />
        : <span className={cx("w-full h-full flex items-center justify-center font-bold text-neutral-700 select-none",
            rnd, avatarBg(name), s.text)}>
            {initials(name)}
          </span>
      }
      {status && (
        <span aria-label={status}
          className={cx("absolute bottom-0 right-0 rounded-full border-white", s.dot, sc)} />
      )}
    </span>
  );
}

/* ── AvatarGroup ─────────────────────────────────────────────────────────── */
/* Stacks up to `max` avatars with overflow count */
function AvatarGroup({ users=[], size="md", max=4, className="" }) {
  const shown = users.slice(0,max);
  const extra = users.length - max;
  const s     = AVATAR_SIZE_MAP[size]??AVATAR_SIZE_MAP.md;
  return (
    <div className={cx("flex items-center", className)}>
      {shown.map((u,i) => (
        <span key={i} style={{ marginLeft: i===0?0:"-10px", zIndex:shown.length-i }}>
          <Avatar {...u} size={size}
            className="ring-2 ring-white" />
        </span>
      ))}
      {extra>0 && (
        <span style={{ marginLeft:"-10px", zIndex:0 }}
          className={cx("relative inline-flex items-center justify-center rounded-full",
            "bg-neutral-200 text-neutral-600 font-bold ring-2 ring-white", s.box, s.text)}>
          +{extra}
        </span>
      )}
    </div>
  );
}

  {id:"inputs",     n:4,  label:"Inputs",     desc:"Campos & controles agnósticos"},
  {id:"badges",     n:5,  label:"Badges",     desc:"Tags & indicadores de status"},
  {id:"cards",      n:6,  label:"Cards",      desc:"Containers com variantes"},
  {id:"alerts",     n:7,  label:"Alertas",    desc:"Feedback inline semântico"},
  {id:"feedback",   n:8,  label:"Feedback",   desc:"Toast, progress, skeleton…"},
  {id:"navigation", n:9,  label:"Navegação",  desc:"Tabs, stepper, pagination…"},
  {id:"overlays",   n:10, label:"Overlays",   desc:"Tooltip, dropdown, modal, drawer, accordion"},
  {id:"avatars",    n:11, label:"Avatares",   desc:"Avatar, status & grupos"},
  {id:"tokens",     n:12, label:"Tokens",     desc:"Design system — referência"},
];

/*
  SECTION_REGISTRY: maps section id → React component.
  Low coupling: App only knows the id, not the implementation.
*/
const SECTION_REGISTRY = {
  colors:     ColorsSection,
  typography: TypographySection,
  buttons:    ButtonsSection,
  inputs:     InputsSection,
  badges:     BadgesSection,
  cards:      CardsSection,
  alerts:     AlertsSection,
  feedback:   FeedbackSection,
  navigation: NavigationSection,
  overlays:   OverlaySection,
  avatars:    AvatarsSection,
  tokens:     TokensSection,
};

/* ── Sidebar nav item ───────────────────────────────────────────────────── */
function NavItem({ id, n, label, active, onClick }) {
  const on = active===id;
  return (
    <button key={id} onClick={() => onClick(id)}
      className={cx(
        "w-full text-left flex items-center gap-2 px-2.5 py-[7px] rounded-lg mb-0.5",
        "text-[12.5px] font-medium border transition-all duration-120",
        "focus:outline-none focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-indigo-500",
        on
          ? "bg-indigo-50 text-indigo-700 border-indigo-100"
          : "text-neutral-600 border-transparent hover:bg-neutral-50 hover:text-neutral-900"
      )}>
      <span className={cx("text-[9px] font-bold tabnum shrink-0 w-4", on?"text-indigo-400":"text-neutral-300")}>
        {String(n).padStart(2,"0")}
      </span>
      <span className="flex-1">{label}</span>
      {on && <span className="w-1 h-3.5 rounded-full bg-indigo-500 shrink-0" />}
    </button>
  );
}

function App() {
  const [active, setActive] = useState("buttons");
  const nav  = NAV_ITEMS.find(n => n.id===active);
  const Comp = SECTION_REGISTRY[active];

  return (
    <div className="flex min-h-screen">

      {/* ── Sidebar ─────────────────────────────────────────────────── */}
      <aside style={{width:212,minWidth:212}}
        className="bg-white border-r border-neutral-200 flex flex-col sticky top-0 h-screen overflow-y-auto shrink-0">

        {/* Logo */}
        <div className="px-4 pt-5 pb-3.5">
          <div className="flex items-center gap-2.5">
            <div className="w-7 h-7 rounded-lg bg-indigo-600 flex items-center justify-center shadow-sm">
              <Icon name="zap" size={13} color="#fff" />
            </div>
            <div>
              <div className="text-[12.5px] font-bold text-neutral-900 leading-tight">UI Dev Kit</div>
              <div className="text-[9px] text-neutral-400 tracking-wider mt-px">component library</div>
            </div>
          </div>
        </div>

        <div className="h-px bg-neutral-100 mx-4 mb-2" />

        {/* Nav */}
        <nav className="px-2 flex-1 py-1">
          <div className="text-[8.5px] font-extrabold text-neutral-300 tracking-[.2em] uppercase px-2.5 pt-2 pb-2">
            Componentes
          </div>
          {NAV_ITEMS.map(item => (
            <NavItem key={item.id} {...item} active={active} onClick={setActive} />
          ))}
        </nav>

        {/* Footer */}
        <div className="px-4 py-3 border-t border-neutral-100">
          <div className="flex items-center gap-1.5">
            <Icon name="copy" size={9} color="#6366f1" />
            <span className="text-[9.5px] text-neutral-400">
              <span className="text-indigo-500 font-semibold">JSX</span> em cada componente
            </span>
          </div>
        </div>
      </aside>

      {/* ── Main ────────────────────────────────────────────────────── */}
      <main className="flex-1 overflow-y-auto">

        {/* Topbar */}
        <header className="bg-white/90 backdrop-blur-sm border-b border-neutral-200 px-8 py-3
          flex items-center justify-between sticky top-0 z-30">
          <div className="flex items-center gap-3">
            <span className="text-[9.5px] font-bold tracking-[.2em] uppercase text-neutral-300 tabnum">
              {String(nav?.n??0).padStart(2,"0")}
            </span>
            <span className="w-px h-4 bg-neutral-200" />
            <span className="text-[14px] font-semibold text-neutral-900">{nav?.label}</span>
          </div>
          <div className="flex items-center gap-3">
            <span className="text-[11px] text-neutral-400 hidden sm:flex items-center gap-1.5">
              <Icon name="copy" size={11} color="#6366f1" />
              hover no componente → copiar JSX
            </span>
            <div className="flex gap-1 ml-1">
              {NAV_ITEMS.map(s => (
                <button key={s.id} title={s.label} onClick={() => setActive(s.id)}
                  className="w-1.5 h-1.5 rounded-full cursor-pointer transition-all duration-150 focus:outline-none"
                  style={{background: active===s.id?"#6366f1":"#d1d5db"}} />
              ))}
            </div>
          </div>
        </header>

        {/* Content */}
        <div key={active} className="kit-in px-8 pt-8 pb-24" style={{maxWidth:1024}}>
          <SectionHeading index={nav?.n??0} title={nav?.label??""} description={nav?.desc} />
          {Comp && <Comp />}
        </div>
      </main>
    </div>
  );
}

/* ── Bootstrap ── */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
